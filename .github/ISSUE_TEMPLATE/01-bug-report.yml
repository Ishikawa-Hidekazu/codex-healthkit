name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        Please do not include credentials, tokens, cookies, private paths, raw session transcripts, or raw `codex doctor` output.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem in a few sentences.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Which command did you run?
      placeholder: ./bin/codex-healthkit check --json
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Default check
        - JSON output
        - With Codex version
        - With official Codex doctor
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, etc.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: redacted-output
    attributes:
      label: Redacted output
      description: Paste only output you have reviewed and redacted.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I reviewed the issue and removed credentials, tokens, cookies, private paths, raw transcripts, and raw doctor output.
          required: true

